<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/><stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="body5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="inner5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd"/><stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg5)" rx="12"/>
  <!-- Main box body -->
  <rect x="55" y="45" width="290" height="200" rx="12" fill="url(#body5)" stroke="#7dd3fc" stroke-width="2"/>
  <!-- Keylights logo area -->
  <rect x="55" y="45" width="120" height="200" rx="12" fill="#f1f5f9"/>
  <rect x="175" y="45" width="2" height="200" fill="#e2e8f0"/>
  <!-- Screen on right side -->
  <rect x="185" y="58" width="145" height="90" rx="6" fill="#0c1a2e"/>
  <text x="257" y="78" font-family="Arial" font-size="9" fill="#38bdf8" text-anchor="middle">VENUS 100 CLIA</text>
  <rect x="192" y="83" width="130" height="1" fill="#1e3a5f"/>
  <text x="195" y="97" font-family="Arial" font-size="7.5" fill="#a3e635">Sample   Ready ●</text>
  <text x="195" y="110" font-family="Arial" font-size="7.5" fill="#fbbf24">Reagent  15 pos</text>
  <text x="195" y="123" font-family="Arial" font-size="7.5" fill="#60a5fa">T/H      150</text>
  <text x="195" y="136" font-family="Arial" font-size="7.5" fill="#34d399">Status   Running</text>
  <!-- Cuvette carousel on left panel -->
  <circle cx="115" cy="155" r="55" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="115" cy="155" r="38" fill="#e2e8f0" stroke="#d1d5db" stroke-width="1.5"/>
  <circle cx="115" cy="155" r="10" fill="#94a3b8"/>
  <!-- Cuvette dots around circle -->
  <circle cx="115" cy="108" r="5" fill="#7c3aed"/>
  <circle cx="148" cy="122" r="5" fill="#7c3aed"/>
  <circle cx="153" cy="155" r="5" fill="#a78bfa"/>
  <circle cx="148" cy="188" r="5" fill="#7c3aed"/>
  <circle cx="115" cy="202" r="5" fill="#a78bfa"/>
  <circle cx="82" cy="188" r="5" fill="#7c3aed"/>
  <circle cx="77" cy="155" r="5" fill="#a78bfa"/>
  <circle cx="82" cy="122" r="5" fill="#7c3aed"/>
  <!-- Sample tube rack right -->
  <rect x="185" y="158" width="145" height="72" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="257" y="175" font-family="Arial" font-size="8" fill="#64748b" text-anchor="middle">Sample Compartment</text>
  <rect x="195" y="180" width="10" height="35" rx="3" fill="#c084fc"/>
  <rect x="210" y="180" width="10" height="35" rx="3" fill="#a855f7"/>
  <rect x="225" y="180" width="10" height="35" rx="3" fill="#c084fc"/>
  <rect x="240" y="180" width="10" height="35" rx="3" fill="#9333ea"/>
  <rect x="255" y="180" width="10" height="35" rx="3" fill="#c084fc"/>
  <rect x="270" y="180" width="10" height="35" rx="3" fill="#a855f7"/>
  <rect x="285" y="180" width="10" height="35" rx="3" fill="#c084fc"/>
  <!-- Label -->
  <text x="200" y="260" font-family="Arial" font-size="13" font-weight="bold" fill="#075985" text-anchor="middle">Venus 100 (3rd Gen)</text>
  <text x="200" y="275" font-family="Arial" font-size="10" fill="#0284c7" text-anchor="middle">Chemiluminescence Immunoassay Analyzer</text>
</svg>
