<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/><stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="body4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/><stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)" rx="12"/>
  <!-- Body with teal accent top -->
  <rect x="55" y="55" width="290" height="185" rx="14" fill="url(#body4)" stroke="#93c5fd" stroke-width="2"/>
  <rect x="55" y="55" width="290" height="20" rx="14" fill="#0d9488"/>
  <rect x="55" y="65" width="290" height="10" fill="#0d9488"/>
  <!-- Bioelab label -->
  <text x="200" y="70" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">BIOELAB  EC-38</text>
  <!-- Screen -->
  <rect x="70" y="83" width="200" height="120" rx="8" fill="#0f172a"/>
  <!-- Histogram on screen -->
  <text x="170" y="100" font-family="Arial" font-size="8" fill="#7dd3fc" text-anchor="middle">HEMATOLOGY RESULTS</text>
  <polyline points="78,190 90,185 102,172 114,152 126,135 138,130 150,138 162,158 174,180 186,188 198,185 210,190 222,191 234,190 246,189 258,190 265,190" fill="none" stroke="#38bdf8" stroke-width="1.8"/>
  <polyline points="78,188 90,183 100,168 112,145 122,132 132,130 142,138 152,160 162,182 172,188 182,186" fill="none" stroke="#f87171" stroke-width="1.5"/>
  <!-- Needle/probe area -->
  <ellipse cx="300" cy="150" rx="25" ry="35" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="300" y1="132" x2="300" y2="168" stroke="#475569" stroke-width="2"/>
  <line x1="290" y1="150" x2="310" y2="150" stroke="#475569" stroke-width="2"/>
  <!-- Warning triangle -->
  <polygon points="310,195 325,195 317.5,182" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="317" y="193" font-family="Arial" font-size="6" fill="#f59e0b" text-anchor="middle">!</text>
  <!-- Tube holder bottom -->
  <rect x="70" y="210" width="265" height="14" rx="4" fill="#bfdbfe"/>
  <rect x="80" y="212" width="7" height="10" rx="2.5" fill="#93c5fd"/>
  <rect x="93" y="212" width="7" height="10" rx="2.5" fill="#93c5fd"/>
  <rect x="106" y="212" width="7" height="10" rx="2.5" fill="#bfdbfe"/>
  <rect x="119" y="212" width="7" height="10" rx="2.5" fill="#93c5fd"/>
  <!-- Label -->
  <text x="200" y="260" font-family="Arial" font-size="13" font-weight="bold" fill="#0369a1" text-anchor="middle">Bioelab EC-38</text>
  <text x="200" y="275" font-family="Arial" font-size="10" fill="#0284c7" text-anchor="middle">3-Part Hematology Analyzer</text>
</svg>
