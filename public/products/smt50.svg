<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/><stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <linearGradient id="body3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb"/><stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>
    <linearGradient id="scr3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg3)" rx="12"/>
  <!-- Main body -->
  <rect x="50" y="50" width="300" height="190" rx="14" fill="url(#body3)" stroke="#86efac" stroke-width="2"/>
  <!-- Large screen -->
  <rect x="65" y="65" width="185" height="130" rx="8" fill="url(#scr3)"/>
  <!-- Screen histogram -->
  <text x="155" y="82" font-family="Arial" font-size="9" fill="#60a5fa" text-anchor="middle">SMT-50 RESULTS</text>
  <rect x="73" y="88" width="168" height="1" rx="0.5" fill="#374151"/>
  <!-- WBC histogram simulation -->
  <polyline points="75,180 85,175 95,160 105,140 115,120 125,115 135,125 145,150 155,170 165,178 175,175 185,168 195,172 205,175 215,178 225,180" fill="none" stroke="#34d399" stroke-width="2"/>
  <!-- RBC curve -->
  <polyline points="75,175 85,170 95,155 105,130 115,108 125,100 135,108 145,130 155,155 165,175 175,178 185,176" fill="none" stroke="#f87171" stroke-width="2"/>
  <!-- Platelet peak -->
  <polyline points="75,179 80,178 85,175 90,168 95,155 100,158 105,170 110,177 115,179" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <!-- Results panel right -->
  <rect x="258" y="65" width="82" height="130" rx="6" fill="#f3f4f6"/>
  <text x="299" y="83" font-family="Arial" font-size="8" font-weight="bold" fill="#374151" text-anchor="middle">REPORT</text>
  <text x="266" y="97" font-family="Arial" font-size="7.5" fill="#059669">WBC  6.2</text>
  <text x="266" y="110" font-family="Arial" font-size="7.5" fill="#dc2626">RBC  4.8</text>
  <text x="266" y="123" font-family="Arial" font-size="7.5" fill="#2563eb">HGB  14.1</text>
  <text x="266" y="136" font-family="Arial" font-size="7.5" fill="#7c3aed">PLT  245</text>
  <text x="266" y="149" font-family="Arial" font-size="7.5" fill="#d97706">MCV  88</text>
  <text x="266" y="162" font-family="Arial" font-size="7.5" fill="#059669">NEU% 62</text>
  <text x="266" y="175" font-family="Arial" font-size="7.5" fill="#0284c7">LYM% 30</text>
  <text x="266" y="188" font-family="Arial" font-size="7.5" fill="#7c3aed">EOS%  4</text>
  <!-- Sample tube holder -->
  <rect x="65" y="205" width="275" height="18" rx="4" fill="#d1fae5"/>
  <rect x="75" y="207" width="8" height="14" rx="3" fill="#6ee7b7"/>
  <rect x="90" y="207" width="8" height="14" rx="3" fill="#6ee7b7"/>
  <rect x="105" y="207" width="8" height="14" rx="3" fill="#a7f3d0"/>
  <rect x="120" y="207" width="8" height="14" rx="3" fill="#6ee7b7"/>
  <!-- Status LED -->
  <circle cx="340" cy="215" r="5" fill="#22c55e"/>
  <!-- Label -->
  <text x="200" y="258" font-family="Arial" font-size="13" font-weight="bold" fill="#15803d" text-anchor="middle">Seamaty SMT-50</text>
  <text x="200" y="273" font-family="Arial" font-size="10" fill="#16a34a" text-anchor="middle">5-Part Auto Hematology Analyzer</text>
</svg>
