  <rect x="120" y="80" width="70" height="150" rx="4" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="155" y="96" font-family="Arial" font-size="7" fill="#6b7280" text-anchor="middle">Color Chart</text>
  <rect x="126" y="100" width="55" height="7" rx="1" fill="#fca5a5"/>
  <rect x="126" y="111" width="55" height="7" rx="1" fill="#fde68a"/>
