<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf4ff"/><stop offset="100%" style="stop-color:#fae8ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg7)" rx="12"/>
  <!-- Bottle -->
  <rect x="210" y="50" width="90" height="170" rx="10" fill="#1c1917"/>
  <rect x="230" y="40" width="50" height="20" rx="5" fill="#292524"/>
  <rect x="220" y="65" width="70" height="2" fill="#44403c"/>
  <!-- Label on bottle -->
  <rect x="215" y="75" width="80" height="130" rx="4" fill="white"/>
  <rect x="215" y="75" width="80" height="25" rx="4" fill="#0ea5e9"/>
  <text x="255" y="90" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">URS-14</text>
  <text x="255" y="108" font-family="Arial" font-size="7" fill="#0369a1" text-anchor="middle">Reagent Strips</text>
  <text x="255" y="120" font-family="Arial" font-size="7" fill="#374151" text-anchor="middle">Urobilinogen</text>
  <text x="255" y="131" font-family="Arial" font-size="7" fill="#374151" text-anchor="middle">Bilirubin</text>
  <text x="255" y="142" font-family="Arial" font-size="7" fill="#374151" text-anchor="middle">Ketone</text>
  <text x="255" y="153" font-family="Arial" font-size="7" fill="#374151" text-anchor="middle">Glucose</text>
  <text x="255" y="164" font-family="Arial" font-size="7" fill="#374151" text-anchor="middle">Protein</text>
  <text x="255" y="175" font-family="Arial" font-size="7" fill="#374151" text-anchor="middle">pH / Blood</text>
  <text x="255" y="192" font-family="Arial" font-size="8" font-weight="bold" fill="#0369a1" text-anchor="middle">100 Strips</text>
  <!-- Test strip -->
  <rect x="90" y="80" width="18" height="150" rx="4" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="1"/>
  <rect x="90" y="95" width="18" height="10" rx="2" fill="#fca5a5"/>
  <rect x="90" y="110" width="18" height="10" rx="2" fill="#fde68a"/>
