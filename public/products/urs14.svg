  <text x="200" y="260" font-family="Arial" font-size="13" font-weight="bold" fill="#7e22ce" text-anchor="middle">URS-14</text>
  <text x="200" y="275" font-family="Arial" font-size="10" fill="#9333ea" text-anchor="middle">Reagent Strips for Urinalysis</text>
