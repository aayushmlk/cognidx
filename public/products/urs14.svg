  <rect x="126" y="166" width="55" height="7" rx="1" fill="#4ade80"/>
  <rect x="126" y="177" width="55" height="7" rx="1" fill="#f472b6"/>
  <rect x="126" y="188" width="55" height="7" rx="1" fill="#34d399"/>
  <rect x="126" y="199" width="55" height="7" rx="1" fill="#60a5fa"/>
