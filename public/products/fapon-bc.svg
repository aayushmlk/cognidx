<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/><stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="body8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/><stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg8)" rx="12"/>
  <!-- Open-lid body -->
  <rect x="50" y="90" width="300" height="155" rx="12" fill="url(#body8)" stroke="#c4b5fd" stroke-width="2"/>
  <!-- Lid (open) -->
  <rect x="50" y="55" width="300" height="45" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2" transform="rotate(-15, 50, 90)"/>
  <rect x="50" y="55" width="300" height="8" rx="4" fill="#7c3aed" transform="rotate(-15, 50, 90)"/>
  <!-- Sample disc left -->
  <circle cx="140" cy="178" r="55" fill="#fef9c3" stroke="#fcd34d" stroke-width="2"/>
  <circle cx="140" cy="178" r="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="140" cy="178" r="8" fill="#f59e0b"/>
  <!-- Reagent disc right -->
  <circle cx="265" cy="178" r="45" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="265" cy="178" r="30" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <circle cx="265" cy="178" r="7" fill="#7c3aed"/>
  <!-- Probe arms -->
  <line x1="195" y1="130" x2="195" y2="210" stroke="#6b7280" stroke-width="3"/>
  <line x1="185" y1="165" x2="215" y2="165" stroke="#6b7280" stroke-width="3"/>
  <circle cx="195" cy="165" r="6" fill="#4b5563"/>
  <!-- LED row at bottom of body -->
  <rect x="65" y="230" width="270" height="6" rx="3" fill="#e5e7eb"/>
  <circle cx="80" cy="233" r="4" fill="#22c55e"/>
  <circle cx="95" cy="233" r="4" fill="#22c55e"/>
  <circle cx="110" cy="233" r="4" fill="#fbbf24"/>
  <circle cx="125" cy="233" r="4" fill="#e5e7eb"/>
  <!-- Label -->
  <text x="200" y="260" font-family="Arial" font-size="13" font-weight="bold" fill="#4c1d95" text-anchor="middle">Fapon Biotech BA Series</text>
  <text x="200" y="275" font-family="Arial" font-size="10" fill="#7c3aed" text-anchor="middle">Automated Biochemistry Analyzer</text>
</svg>
