<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ebff"/>
      <stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8"/>
      <stop offset="100%" style="stop-color:#e2e2e2"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Device body -->
  <rect x="60" y="60" width="280" height="180" rx="16" fill="url(#body)" stroke="#c4b5fd" stroke-width="2"/>
  <!-- Screen -->
  <rect x="80" y="75" width="165" height="110" rx="8" fill="url(#screen)"/>
  <!-- Screen content lines -->
  <rect x="90" y="90" width="80" height="6" rx="3" fill="#60a5fa" opacity="0.8"/>
  <rect x="90" y="103" width="60" height="4" rx="2" fill="#34d399" opacity="0.7"/>
  <rect x="90" y="113" width="100" height="3" rx="1.5" fill="#94a3b8" opacity="0.5"/>
  <rect x="90" y="120" width="90" height="3" rx="1.5" fill="#94a3b8" opacity="0.5"/>
  <rect x="90" y="127" width="70" height="3" rx="1.5" fill="#94a3b8" opacity="0.5"/>
  <!-- Chart bars on screen -->
  <rect x="175" y="145" width="10" height="30" rx="2" fill="#8b5cf6" opacity="0.9"/>
  <rect x="190" y="135" width="10" height="40" rx="2" fill="#a78bfa" opacity="0.9"/>
  <rect x="205" y="140" width="10" height="35" rx="2" fill="#8b5cf6" opacity="0.9"/>
  <rect x="220" y="130" width="10" height="45" rx="2" fill="#7c3aed" opacity="0.9"/>
  <!-- Cassette slots on right -->
  <rect x="258" y="80" width="68" height="100" rx="6" fill="#d1d5db"/>
  <rect x="265" y="88" width="54" height="12" rx="3" fill="#9ca3af"/>
  <rect x="265" y="104" width="54" height="12" rx="3" fill="#9ca3af"/>
  <rect x="265" y="120" width="54" height="12" rx="3" fill="#9ca3af"/>
  <rect x="265" y="136" width="54" height="12" rx="3" fill="#9ca3af"/>
  <rect x="265" y="152" width="54" height="12" rx="3" fill="#9ca3af"/>
  <!-- Power button -->
  <circle cx="310" cy="205" r="8" fill="#7c3aed"/>
  <rect x="308" y="199" width="4" height="8" rx="2" fill="white"/>
  <!-- Label -->
  <text x="200" y="258" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5b2d8e" text-anchor="middle">AF-1200</text>
  <text x="200" y="273" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">Fluorescence Immunoassay Analyzer</text>
</svg>
